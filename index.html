<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Delovu Labs</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      background: #0c0c10;
      color: #a0a0b8;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 48px;
    }

    .logo-mark {
      width: 28px;
      height: 28px;
      background: #4d9fff;
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-mark svg {
      width: 14px;
      height: 14px;
      fill: #fff;
    }

    .logo-name {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.3px;
    }

    main {
      max-width: 560px;
    }

    h1 {
      font-size: 42px;
      font-weight: 800;
      color: #fff;
      line-height: 1.1;
      letter-spacing: -1.5px;
      margin-bottom: 18px;
    }

    h1 span {
      color: #4d9fff;
    }

    p {
      font-size: 17px;
      line-height: 1.65;
      color: #5a5a72;
      max-width: 420px;
      margin: 0 auto;
    }

    .products {
      display: flex;
      gap: 12px;
      margin-top: 36px;
      justify-content: center;
    }

    .product {
      background: #13131a;
      border: 1px solid #1e1e2e;
      border-radius: 10px;
      padding: 14px 18px;
      text-decoration: none;
      transition: border-color 0.15s;
    }

    .product:hover {
      border-color: #2e2e48;
    }

    .product-name {
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 2px;
    }

    .product-type {
      font-size: 11px;
      color: #44445a;
    }

    footer {
      margin-top: 64px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      color: #2e2e48;
    }

    footer a {
      color: #44445a;
      text-decoration: none;
    }

    footer a:hover {
      color: #6e6e8a;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo-mark">
      <svg viewBox="0 0 14 14"><rect x="1" y="1" width="5" height="5" rx="1"/><rect x="8" y="1" width="5" height="5" rx="1"/><rect x="1" y="8" width="5" height="5" rx="1"/><rect x="8" y="8" width="5" height="5" rx="1"/></svg>
    </div>
    <span class="logo-name">Delovu Labs</span>
  </header>

  <main>
    <h1>Small tools.<br><span>Big impact.</span></h1>
    <p>We build focused apps and plugins for e-commerce merchants and designers.</p>
    <div class="products">
      <div class="product">
        <div class="product-name">Announce Bar Pro</div>
        <div class="product-type">Shopify App</div>
      </div>
      <div class="product">
        <div class="product-name">Exportly</div>
        <div class="product-type">Figma Plugin</div>
      </div>
    </div>
  </main>

  <footer>
    <a href="/privacy-policy">Privacy Policy</a>
    <span>© 2026 Delovu Labs</span>
  </footer>

</body>
</html>
